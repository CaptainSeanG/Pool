<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pool Phone Upload</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/exifr/dist/lite.umd.js"></script>
  <script src="app-config.js?v=20260615-worker"></script>
  <style>
    :root{--bg1:#04182d;--bg2:#0c3f6a;--bg3:#0f6da7;--card:rgba(255,255,255,.12);--border:rgba(255,255,255,.14);--text:#ebf8ff;--muted:#b9d9ee;--good:#5fe0a2;--shadow:0 18px 50px rgba(0,0,0,.28)}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);background:radial-gradient(circle at 15% 6%,rgba(105,210,255,.2),transparent 24%),linear-gradient(180deg,var(--bg1),var(--bg2) 45%,var(--bg3));min-height:100vh}
    .shell{width:min(100% - 22px,680px);margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 0 calc(28px + env(safe-area-inset-bottom))}
    .top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;margin-bottom:16px}.kicker{color:#dff7ff;font-weight:900;font-size:.78rem;text-transform:uppercase;letter-spacing:.08em}.nav-link{display:flex;flex-direction:column;align-items:flex-end;gap:7px}.link{color:#e8fbff;text-decoration:none;border:1px solid var(--border);border-radius:999px;padding:9px 12px;background:rgba(255,255,255,.08);font-weight:800}.version{color:var(--muted);font-size:.82rem;font-weight:900}
    h1{margin:4px 0 0;font-size:clamp(2rem,10vw,3.3rem);line-height:.95;letter-spacing:-.03em}.sub{color:var(--muted);line-height:1.45;margin:10px 0 0}.card{background:linear-gradient(135deg,rgba(255,255,255,.15),rgba(255,255,255,.08));border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);padding:16px;margin:14px 0}
    .latest{display:grid;grid-template-columns:1fr;gap:8px}.label{color:var(--muted);font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;font-weight:900}.big{font-size:1.35rem;font-weight:900}.summary{color:var(--muted);line-height:1.45}
    .upload-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.upload-btn{display:flex;align-items:center;justify-content:center;min-height:68px;text-align:center;border:1px solid rgba(255,255,255,.18);border-radius:18px;color:var(--text);background:linear-gradient(145deg,rgba(95,224,162,.26),rgba(105,210,255,.18));font-weight:950;font-size:1rem;line-height:1.15}.upload-btn.secondary{background:rgba(255,255,255,.09)}.photo-input{position:absolute;inline-size:1px;block-size:1px;opacity:0;pointer-events:none}
    .gauge-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.gauge-card{text-align:center;overflow:hidden;padding:12px 8px}.gauge-wrap{max-width:180px;margin:0 auto}.gauge-svg{width:100%;height:auto;display:block}.gauge-name{font-size:.82rem;font-weight:900}.gauge-reading{font-size:1.05rem;font-weight:950;margin-top:3px}.ideal{display:inline-flex;margin-top:5px;padding:5px 8px;border-radius:999px;background:#d8fff0;color:#05243a;font-weight:950;font-size:.72rem}
    .status{min-height:24px;color:#dff7ff;font-weight:850;line-height:1.4}.recent{display:grid;gap:8px}.recent-row{display:flex;justify-content:space-between;gap:10px;border-top:1px solid rgba(255,255,255,.08);padding-top:8px;color:var(--muted);font-size:.9rem}.recent-row strong{color:var(--text)}
    .notice{position:fixed;inset:0;display:none;align-items:center;justify-content:center;padding:22px;background:rgba(2,12,24,.58);backdrop-filter:blur(5px);z-index:10}.notice.open{display:flex}.notice-box{width:min(390px,100%);border:1px solid rgba(255,255,255,.18);border-radius:24px;background:linear-gradient(145deg,rgba(7,42,68,.98),rgba(13,78,116,.96));box-shadow:0 24px 70px rgba(0,0,0,.45);padding:22px;text-align:center}.notice-box strong{display:block;font-size:1.25rem;margin-bottom:8px}.notice-box p{margin:0;color:var(--muted);line-height:1.45}
    @media (max-width:420px){.upload-grid,.gauge-grid{grid-template-columns:1fr}.gauge-wrap{max-width:230px}.top{flex-direction:column}.link{align-self:flex-start}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="top"><div><div class="kicker">Pool phone lab</div><h1>Quick upload</h1><p class="sub">Add new strip photos or Leslie's printouts. Images are stored in this browser and update the shared dashboard ledger.</p></div><div class="nav-link"><a class="link" href="index.html">Dashboard</a><span id="appVersion" class="version">v8</span></div></div>
    <section class="card latest"><div class="label">Latest test</div><div id="latestDate" class="big">-</div><div id="latestSummary" class="summary">-</div></section>
    <section class="card"><div class="upload-grid"><label class="upload-btn" for="stripCamera">Snap strip</label><input id="stripCamera" class="photo-input" type="file" accept="image/*" capture="environment"><label class="upload-btn secondary" for="stripLibrary">Upload strip</label><input id="stripLibrary" class="photo-input" type="file" accept="image/*"><label class="upload-btn" for="leslieCamera">Snap Leslie's</label><input id="leslieCamera" class="photo-input" type="file" accept="image/*" capture="environment"><label class="upload-btn secondary" for="leslieLibrary">Upload Leslie's</label><input id="leslieLibrary" class="photo-input" type="file" accept="image/*"></div><p id="uploadStatus" class="status"></p></section>
    <section class="gauge-grid" id="gaugeGrid"></section>
    <section class="card"><div class="label">Recent local rows</div><div id="recentRows" class="recent"></div></section>
  </main>
  <div id="notice" class="notice" role="status" aria-live="polite"><div class="notice-box"><strong id="noticeTitle">Processing</strong><p id="noticeText">Saving image...</p></div></div>
  <script src="data.js"></script>
  <script>
    const STORAGE_KEY='poolDashboardLocalTests';
    const UPLOAD_KEY_STORAGE='poolDashboardUploadKey';
    const APP_VERSION='v8';
    const DEFAULT_API_BASE='https://pool-chemical-uploader.macgyver2.workers.dev';
    const API_BASE=(window.POOL_API_BASE||DEFAULT_API_BASE).replace(/\/+$/,'');
    const SHARED_LEDGER_URL='ledger.json';
    const numericFields=['fc','tc','ph','ta','ch','cya','iron','copper','phosphates','tds'];
    const fmt=(v,s='')=>v===null||v===undefined||v===''?'-':`${v}${s}`;
    const toNumberOrNull=value=>{if(value===null||value===undefined||value==='')return null; const parsed=Number(value); return Number.isFinite(parsed)?parsed:null};
    const seedTests=(window.POOL_TESTS||[]).map((row,index)=>normalizeRow(row,index));
    let tests=loadTests();

    function normalizeRow(row,index){
      const copy={...row};
      copy.id=copy.id||`seed-${index}-${copy.date||'no-date'}-${copy.time||'none'}`;
      copy.photo=copy.photo||null; copy.analysis=copy.analysis||'';
      ['date','time','source','confidence','notes'].forEach(key=>copy[key]=copy[key]??'');
      numericFields.forEach(key=>copy[key]=toNumberOrNull(copy[key]));
      return copy;
    }
    function loadTests(){
      try{const saved=localStorage.getItem(STORAGE_KEY); if(saved) return JSON.parse(saved).map((row,index)=>normalizeRow(row,index));}catch(err){console.warn(err)}
      return seedTests.map(row=>({...row}));
    }
    function mergeRows(...groups){
      const map=new Map();
      groups.flat().forEach((row,index)=>map.set(row.id||`row-${index}`,normalizeRow(row,index)));
      return [...map.values()];
    }
    async function loadSharedLedger(){
      try{
        const response=await fetch(`${SHARED_LEDGER_URL}?v=${Date.now()}`,{cache:'no-store'});
        if(!response.ok) return;
        const shared=await response.json();
        if(Array.isArray(shared)){tests=mergeRows(tests,shared); renderAll();}
      }catch(err){console.warn(err)}
    }
    function persistTests(){localStorage.setItem(STORAGE_KEY,JSON.stringify(tests))}
    function showNotice(title,text,autoClose=false){
      document.getElementById('noticeTitle').textContent=title;
      document.getElementById('noticeText').textContent=text;
      document.getElementById('notice').classList.add('open');
      if(autoClose) setTimeout(()=>document.getElementById('notice').classList.remove('open'),1900);
    }
    function getUploadKey(){
      let key=localStorage.getItem(UPLOAD_KEY_STORAGE)||'';
      if(!key&&API_BASE){
        key=prompt('Enter the pool upload key for this iPhone:')||'';
        if(key) localStorage.setItem(UPLOAD_KEY_STORAGE,key);
      }
      return key;
    }
    async function uploadSharedRow(row){
      if(!API_BASE) return {ok:false,reason:'Worker not configured'};
      const key=getUploadKey();
      if(!key) return {ok:false,reason:'Missing upload key'};
      const response=await fetch(`${API_BASE}/upload`,{method:'POST',headers:{'Content-Type':'application/json','x-pool-upload-key':key},body:JSON.stringify({row,photo:row.photo})});
      const payload=await response.json().catch(()=>({}));
      if(!response.ok) throw new Error(payload.error||`Upload failed with ${response.status}`);
      return {ok:true,row:payload.row};
    }
    function sortedTests(){
      return [...tests].sort((a,b)=>{
        const diff=timestampFor(a)-timestampFor(b);
        return diff||String(a.id||'').localeCompare(String(b.id||''));
      });
    }
    function formatSimpleTime(time){
      const raw=String(time||'').trim();
      if(!raw) return '';
      const parsed=new Date(`2000-01-01 ${raw}`);
      if(Number.isNaN(parsed.getTime())) return raw.toLowerCase().replace(/\s+/g,'');
      return parsed.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'}).toLowerCase().replace(/\s+/g,'');
    }
    function timestampFor(row){
      const date=row.date||'1900-01-01',raw=String(row.time||'').trim();
      const named={Morning:'08:00',AM:'08:00',Today:'12:00',PM:'15:00',Evening:'19:00',Unknown:'12:00','':'12:00'};
      const time=named[raw]||raw||'12:00',parsed=new Date(`${date} ${time}`);
      if(!Number.isNaN(parsed.getTime())) return parsed.getTime();
      return new Date(`${date}T12:00:00`).getTime();
    }
    async function stampFromImage(file){
      let taken=null;
      try{const meta=await window.exifr?.parse(file,{pick:['DateTimeOriginal','CreateDate','ModifyDate']}); taken=meta?.DateTimeOriginal||meta?.CreateDate||meta?.ModifyDate||null;}catch(err){console.warn(err)}
      if(!taken&&file.lastModified) taken=new Date(file.lastModified);
      if(!(taken instanceof Date)||Number.isNaN(taken.getTime())) taken=new Date();
      const y=taken.getFullYear(),m=String(taken.getMonth()+1).padStart(2,'0'),d=String(taken.getDate()).padStart(2,'0');
      return {date:`${y}-${m}-${d}`,time:taken.toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})};
    }
    function fileToImage(file){
      return new Promise((resolve,reject)=>{const reader=new FileReader(); reader.onload=()=>{const img=new Image(); img.onload=()=>resolve(img); img.onerror=reject; img.src=reader.result}; reader.onerror=reject; reader.readAsDataURL(file)});
    }
    async function compressPhoto(file){
      const img=await fileToImage(file),maxSide=1400,scale=Math.min(1,maxSide/Math.max(img.width,img.height));
      const canvas=document.createElement('canvas'); canvas.width=Math.max(1,Math.round(img.width*scale)); canvas.height=Math.max(1,Math.round(img.height*scale));
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      return {dataUrl:canvas.toDataURL('image/jpeg',.82),width:canvas.width,height:canvas.height};
    }
    const extractNumbers=(text,validator=()=>true)=>[...String(text).replace(/,/g,'').matchAll(/(?:^|[^0-9.])([0-9]+(?:\.[0-9]+)?)(?![0-9.])/g)].map(match=>toNumberOrNull(match[1])).filter(value=>value!==null&&validator(value));
    const extractResultNumberFromLine=(line,validator=()=>true)=>{const matches=extractNumbers(line,validator); return matches.length?matches[matches.length-1]:null};
    function findOcrValue(lines,pattern,validator=()=>true){for(const line of lines){if(!pattern.test(line))continue; const value=extractResultNumberFromLine(line,validator); if(value!==null)return value} return null}
    function findRangeResults(lines,rangePattern,validator=()=>true,minCount=3){const results=[],seen=new Set(); lines.forEach((_,index)=>{const block=lines.slice(index,index+3).join(' '); if(!rangePattern.test(block)||seen.has(block))return; seen.add(block); const numbers=extractNumbers(block,validator),result=numbers[numbers.length-1]; if(numbers.length>=minCount&&results[results.length-1]!==result)results.push(result);}); return results}
    function applyLeslieRangeFallback(lines,values){const rangeMap=[['ph',/7\.2\s*[-–]\s*7\.8/i,v=>v>=6&&v<=10,0,()=>true],['ta',/80\s*[-–]\s*120/i,v=>v<=400,0,value=>value===null||value<40],['ch',/200\s*[-–]\s*400/i,v=>v<=1200,0,()=>true],['cya',/30\s*[-–]\s*100/i,v=>v<=300,0,()=>true],['iron',/0\s*[-–]\s*0\.?2/i,v=>v<=10,0,()=>true],['copper',/0\s*[-–]\s*0\.?2/i,v=>v<=10,1,()=>true],['phosphates',/0\s*[-–]\s*100\s*p{1,2}b/i,v=>v<=10000,0,()=>true],['tds',/0\s*[-–]\s*2500/i,v=>v<=10000,0,()=>true]]; rangeMap.forEach(([key,pattern,validator,occurrence,shouldReplace])=>{if(!shouldReplace(values[key]))return; const candidates=findRangeResults(lines,pattern,validator); if(candidates[occurrence]!==undefined)values[key]=candidates[occurrence];});}
    const leslieResultOrder=['fc','tc','ph','ta','ch','cya','iron','copper','phosphates','tds'];
    const leslieValidators={fc:v=>v>=0&&v<=20,tc:v=>v>=0&&v<=20,ph:v=>v>=6&&v<=10,ta:v=>v>=40&&v<=400,ch:v=>v>=40&&v<=1200,cya:v=>v>=10&&v<=300,iron:v=>v>=0&&v<=10,copper:v=>v>=0&&v<=10,phosphates:v=>v>=0&&v<=10000,tds:v=>v>=100&&v<=10000};
    function applyLeslieSequence(values,sequence,offset=0){leslieResultOrder.slice(offset).forEach((key,index)=>{const value=sequence[index]; if(value!==undefined&&leslieValidators[key](value))values[key]=value;});}
    function valuesFromLeslieSequence(numbers){const values=Object.fromEntries(leslieResultOrder.map(key=>[key,null])); if(numbers.length>=10){for(let start=0;start<=numbers.length-10;start++){const slice=numbers.slice(start,start+10); if(leslieResultOrder.every((key,index)=>leslieValidators[key](slice[index]))){applyLeslieSequence(values,slice,0); return values;}}} if(numbers.length>=7){const slice=numbers.slice(-7),keys=leslieResultOrder.slice(3); if(keys.every((key,index)=>leslieValidators[key](slice[index])))applyLeslieSequence(values,slice,3);} if(numbers.length>=5){const slice=numbers.slice(-5),keys=leslieResultOrder.slice(5); if(keys.every((key,index)=>leslieValidators[key](slice[index])))applyLeslieSequence(values,slice,5);} return values;}
    async function cropDataUrl(dataUrl,crop){const img=await imageFromDataUrl(dataUrl),canvas=document.createElement('canvas'); canvas.width=Math.max(1,Math.round(img.width*crop.w)); canvas.height=Math.max(1,Math.round(img.height*crop.h)); const ctx=canvas.getContext('2d'); ctx.filter='grayscale(1) contrast(1.8)'; ctx.drawImage(img,img.width*crop.x,img.height*crop.y,img.width*crop.w,img.height*crop.h,0,0,canvas.width,canvas.height); return canvas.toDataURL('image/png');}
    async function readLeslieResultColumn(dataUrl){const crops=[{x:.64,y:.30,w:.30,h:.47},{x:.66,y:.315,w:.26,h:.445},{x:.68,y:.32,w:.22,h:.435}]; let best=[]; for(const crop of crops){try{const cropped=await cropDataUrl(dataUrl,crop); const result=await Tesseract.recognize(cropped,'eng',{tessedit_char_whitelist:'0123456789. '}); const numbers=extractNumbers(result.data?.text||'',v=>v>=0&&v<=10000); if(numbers.length>best.length)best=numbers;}catch(err){console.warn('Leslie result-column OCR failed',err);}} return valuesFromLeslieSequence(best);}
    function firstValidCellValue(text,key){const numbers=extractNumbers(text,leslieValidators[key]); if(!numbers.length)return null; if(key==='cya'){const likely=numbers.find(value=>value>=10&&value<=150); if(likely!==undefined)return likely;} if(key==='phosphates'){const likely=numbers.find(value=>value>=50&&value<=5000); if(likely!==undefined)return likely;} if(key==='tds'){const likely=numbers.find(value=>value>=100&&value<=10000); if(likely!==undefined)return likely;} return numbers[numbers.length-1];}
    async function readLeslieResultCells(dataUrl){const values=Object.fromEntries(leslieResultOrder.map(key=>[key,null])),layouts=[{x:.66,y:.315,w:.26,h:.445},{x:.68,y:.32,w:.22,h:.435},{x:.64,y:.305,w:.30,h:.46}]; for(const layout of layouts){const rowH=layout.h/10; for(let index=0;index<leslieResultOrder.length;index++){const key=leslieResultOrder[index]; if(values[key]!==null)continue; const crop={x:layout.x,y:layout.y+(rowH*index),w:layout.w,h:rowH*1.12}; try{const cropped=await cropDataUrl(dataUrl,crop); const result=await Tesseract.recognize(cropped,'eng',{tessedit_char_whitelist:'0123456789. '}); values[key]=firstValidCellValue(result.data?.text||'',key);}catch(err){console.warn('Leslie result-cell OCR failed',err);}}} return values;}
    function parseLeslieText(text){
      const lines=text.split(/\r?\n/).map(line=>line.trim()).filter(Boolean);
      const tableStart=lines.findIndex(line=>/test|ideal range|result/i.test(line));
      const tableLines=tableStart>=0?lines.slice(tableStart):lines;
      const defs=[['fc',/(free chlorine|free available chlorine|\bfac\b)/i,v=>v<=20],['tc',/(total chlorine|\btc\b)/i,v=>v<=20],['ph',/(^|\s)ph(\s|$|:)/i,v=>v>=6&&v<=10],['ta',/(total alkalinity|alkalinity|\bta\b)/i,v=>v<=400],['ch',/(calcium hardness|hardness|\bch\b)/i,v=>v<=1200],['cya',/(cyanuric acid|stabilizer|\bcya\b)/i,v=>v<=300],['iron',/\biron\b/i,v=>v<=10],['copper',/\bcopper\b/i,v=>v<=10],['phosphates',/(phosphates|phosphate)/i,v=>v<=10000],['tds',/(^|\s)tds(\s|$|:)/i,v=>v<=10000]];
      const values=Object.fromEntries(defs.map(([key])=>[key,null])),starts=[];
      tableLines.forEach((line,index)=>{defs.forEach(([key,pattern])=>{if(!starts.some(item=>item.key===key)&&pattern.test(line)) starts.push({key,index});});});
      starts.sort((a,b)=>a.index-b.index);
      starts.forEach((start,position)=>{const [,pattern,validator]=defs.find(([key])=>key===start.key); const end=starts[position+1]?.index??Math.min(tableLines.length,start.index+5); const numbers=extractNumbers(tableLines.slice(start.index,end).join(' '),validator); values[start.key]=numbers.length?numbers[numbers.length-1]:findOcrValue(tableLines,pattern,validator);});
      defs.forEach(([key,pattern,validator])=>{if(values[key]===null) values[key]=findOcrValue(lines,pattern,validator);});
      applyLeslieRangeFallback(tableLines,values);
      return values;
    }
    function describeParsedValues(values){
      const labels={fc:'FC',tc:'TC',ph:'pH',ta:'TA',ch:'CH',cya:'CYA',iron:'Iron',copper:'Copper',phosphates:'Phosphates',tds:'TDS'};
      const found=Object.entries(values).filter(([,value])=>value!==null).map(([key,value])=>`${labels[key]} ${value}`);
      return found.length?`OCR parsed: ${found.join(', ')}. Review on the dashboard ledger.`:'OCR did not confidently find chemistry numbers. The image is stored; enter values on the dashboard ledger.';
    }
    function mergeParsedValues(base,extra){const merged={...base}; Object.entries(extra||{}).forEach(([key,value])=>{if(value!==null&&value!==undefined)merged[key]=value;}); return merged}
    function cleanLeslieValues(values){const clean={...values}; if(clean.cya!==null&&clean.cya<10)clean.cya=null; if(clean.tds!==null&&clean.tds<100)clean.tds=null; return clean}
    async function analyzeLeslieSheet(dataUrl){
      if(!window.Tesseract?.recognize) return {values:{},analysis:'Leslie sheet stored. OCR was not available.'};
      document.getElementById('uploadStatus').textContent='Reading Leslie sheet...';
      showNotice('Processing Leslie sheet','Reading the printout and looking for chemistry numbers.');
      try{const result=await Tesseract.recognize(dataUrl,'eng'); let values=parseLeslieText(result.data?.text||''); values=mergeParsedValues(values,await readLeslieResultColumn(dataUrl)); values=mergeParsedValues(values,await readLeslieResultCells(dataUrl)); values=cleanLeslieValues(values); return {values,analysis:describeParsedValues(values)}}catch(err){console.warn(err); return {values:{},analysis:'Leslie sheet stored. OCR could not read this image clearly.'}}
    }
    async function analyzeStrip(dataUrl){
      const result=await analyzeStripPhoto(dataUrl);
      return result;
    }
    function imageFromDataUrl(dataUrl){
      return new Promise((resolve,reject)=>{const img=new Image(); img.onload=()=>resolve(img); img.onerror=reject; img.src=dataUrl});
    }
    function colorDistance(a,b){
      const as=a[0]+a[1]+a[2],bs=b[0]+b[1]+b[2],an=a.map(v=>v/as),bn=b.map(v=>v/bs);
      return Math.hypot((an[0]-bn[0])*2.2,(an[1]-bn[1])*2.2,(an[2]-bn[2])*2.2,(a[0]-b[0])/420,(a[1]-b[1])/420,(a[2]-b[2])/420);
    }
    function closestPaletteValue(color,palette){return palette.reduce((best,item)=>{const score=colorDistance(color,item.rgb); return score<best.score?{...item,score}:best},{value:null,score:Infinity})}
    function summarizeStrip(values){
      const labels={ch:'CH',fc:'FC',tc:'TC',cya:'CYA',ta:'TA',ph:'pH'};
      const found=Object.entries(values).filter(([,value])=>value!==null&&value!==undefined).map(([key,value])=>`${labels[key]} ${value}`);
      return found.length?`Strip color analysis estimated: ${found.join(', ')}. Review on the dashboard ledger.`:'Strip photo stored, but the colored pads were not clear enough to estimate values.';
    }
    async function analyzeStripPhoto(dataUrl){
      const img=await imageFromDataUrl(dataUrl),canvas=document.createElement('canvas'),w=260,h=Math.max(1,Math.round(img.height*(260/img.width)));
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d',{willReadFrequently:true});
      ctx.drawImage(img,0,0,w,h);
      const data=ctx.getImageData(0,0,w,h).data,counts=new Array(h).fill(0),sums=Array.from({length:h},()=>[0,0,0,0]);
      for(let y=0;y<h;y++)for(let x=Math.floor(w*.62);x<w-4;x++){const i=(y*w+x)*4,r=data[i],g=data[i+1],b=data[i+2],max=Math.max(r,g,b),min=Math.min(r,g,b); if(max-min>38&&max>70&&min<230){counts[y]++; sums[y][0]+=r; sums[y][1]+=g; sums[y][2]+=b; sums[y][3]++;}}
      const smooth=counts.map((_,i)=>counts.slice(Math.max(0,i-2),Math.min(h,i+3)).reduce((a,b)=>a+b,0)/5),threshold=Math.max(4,Math.max(...smooth)*.22),segments=[];
      for(let y=0;y<h;y++){if(smooth[y]<=threshold)continue; const start=y; while(y<h&&smooth[y]>threshold)y++; const end=y-1; if(end-start>=4)segments.push({start,end,weight:smooth.slice(start,end+1).reduce((a,b)=>a+b,0)});}
      const pads=segments.sort((a,b)=>b.weight-a.weight).slice(0,8).sort((a,b)=>a.start-b.start).map(seg=>{const sum=[0,0,0,0]; for(let y=seg.start;y<=seg.end;y++){sum[0]+=sums[y][0]; sum[1]+=sums[y][1]; sum[2]+=sums[y][2]; sum[3]+=sums[y][3];} return [Math.round(sum[0]/sum[3]),Math.round(sum[1]/sum[3]),Math.round(sum[2]/sum[3])];}).filter(color=>color.every(Number.isFinite));
      const palettes={ch:[{value:0,rgb:[33,73,104]},{value:100,rgb:[88,110,162]},{value:250,rgb:[93,70,132]},{value:500,rgb:[122,70,132]},{value:1000,rgb:[86,38,74]}],fc:[{value:0,rgb:[236,213,224]},{value:.5,rgb:[224,188,213]},{value:1,rgb:[209,151,196]},{value:3,rgb:[184,86,161]},{value:5,rgb:[132,48,120]},{value:10,rgb:[88,32,82]}],tc:[{value:0,rgb:[236,219,224]},{value:1,rgb:[222,171,203]},{value:2,rgb:[205,123,188]},{value:6,rgb:[176,78,160]},{value:10,rgb:[130,50,130]},{value:20,rgb:[82,36,90]}],cya:[{value:40,rgb:[235,119,77]},{value:100,rgb:[226,91,91]},{value:150,rgb:[203,70,86]},{value:240,rgb:[159,60,91]}],ta:[{value:40,rgb:[174,190,117]},{value:80,rgb:[138,177,145]},{value:120,rgb:[102,166,156]},{value:180,rgb:[61,145,151]},{value:240,rgb:[37,111,131]}],ph:[{value:6.2,rgb:[230,176,41]},{value:6.8,rgb:[224,122,25]},{value:7.2,rgb:[219,86,25]},{value:7.8,rgb:[195,60,40]},{value:8.4,rgb:[158,41,45]},{value:9,rgb:[101,31,42]}]};
      const ordered={ch:pads[0],fc:pads[1],tc:pads[2],cya:pads[4]||pads[3],ta:pads[5]||pads[4],ph:pads[6]||pads[5]},values={};
      Object.entries(ordered).forEach(([key,color])=>{values[key]=color?closestPaletteValue(color,palettes[key]).value:null;});
      return {values,analysis:summarizeStrip(values)};
    }
    async function handleUpload(event,kind){
      const file=event.target.files?.[0]; event.target.value=''; if(!file)return;
      document.getElementById('uploadStatus').textContent='Saving photo...';
      showNotice('Processing upload','Reading the image date, saving the photo, and preparing the ledger row.');
      try{
        const [photo,stamp]=await Promise.all([compressPhoto(file),stampFromImage(file)]);
        const sheet=kind==='leslie'?await analyzeLeslieSheet(photo.dataUrl):null;
        const sheetHasValues=sheet&&Object.values(sheet.values||{}).some(value=>value!==null&&value!==undefined);
        const strip=kind==='strip'||(sheet&&!sheetHasValues)?await analyzeStrip(photo.dataUrl):null;
        const analysis=sheetHasValues?sheet.analysis:strip.analysis;
        const parsed=sheetHasValues?sheet.values:strip.values;
        const row=normalizeRow({id:`photo-${Date.now()}`,date:stamp.date,time:stamp.time,source:kind==='leslie'?'Leslie\'s sheet upload':'Phone strip photo',confidence:sheetHasValues?'OCR - review':'Photo analysis - review',fc:parsed.fc??null,tc:parsed.tc??null,ph:parsed.ph??null,ta:parsed.ta??null,ch:parsed.ch??null,cya:parsed.cya??null,iron:parsed.iron??null,copper:parsed.copper??null,phosphates:parsed.phosphates??null,tds:parsed.tds??null,notes:analysis,analysis,photo:{dataUrl:photo.dataUrl,name:file.name||'pool-photo.jpg',type:'image/jpeg',width:photo.width,height:photo.height,uploadedAt:new Date().toISOString()}},tests.length);
        tests.push(row); persistTests(); renderAll();
        let accepted=row,sharedMessage='Saved locally on this device.';
        try{
          const shared=await uploadSharedRow(row);
          if(shared.ok&&shared.row){
            accepted=normalizeRow(shared.row,tests.length);
            tests=tests.map(item=>item.id===row.id?accepted:item);
            persistTests();
            renderAll();
            setTimeout(loadSharedLedger,1200);
            sharedMessage='Saved to GitHub shared ledger.';
          }
        }catch(err){
          console.error(err);
          sharedMessage=`Saved locally, but GitHub upload failed: ${err.message}`;
        }
        document.getElementById('uploadStatus').textContent=`${sharedMessage} ${accepted.source} for ${accepted.date} ${accepted.time}.`;
        showNotice(sharedMessage.startsWith('Saved to GitHub')?'Accepted results':'Saved locally',`${accepted.source} was added for ${accepted.date} ${accepted.time}. ${sharedMessage}`,true);
      }catch(err){console.error(err); document.getElementById('notice').classList.remove('open'); document.getElementById('uploadStatus').textContent='Could not save that image. Try a smaller or clearer photo.'}
    }
    function polar(cx,cy,r,a){const rad=(a-90)*Math.PI/180; return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}}
    function arcPath(cx,cy,r,start,end){const s=polar(cx,cy,r,end),e=polar(cx,cy,r,start),large=end-start<=180?0:1; return `M ${s.x} ${s.y} A ${r} ${r} 0 ${large} 0 ${e.x} ${e.y}`}
    function angleFor(v,min,max){const ratio=(Math.min(max,Math.max(min,v))-min)/(max-min); return -90+ratio*180}
    function gauge(cfg){
      const card=document.createElement('div'); card.className='card gauge-card';
      const w=330,h=220,cx=165,cy=184,outer=120,labelR=105,needleR=94,br=142;
      let segs='',ticks='';
      for(let i=0;i<cfg.stops.length-1;i++)segs+=`<path d="${arcPath(cx,cy,outer,angleFor(cfg.stops[i].value,cfg.min,cfg.max),angleFor(cfg.stops[i+1].value,cfg.min,cfg.max))}" stroke="${cfg.stops[i].color}" stroke-width="26" fill="none"></path>`;
      cfg.stops.forEach(s=>{const p=polar(cx,cy,labelR,angleFor(s.value,cfg.min,cfg.max)); ticks+=`<text x="${p.x}" y="${p.y}" text-anchor="middle" dominant-baseline="middle" font-size="15" font-weight="900" fill="#102539" stroke="rgba(239,250,255,.75)" stroke-width="3" paint-order="stroke">${s.label}</text>`});
      const a=angleFor(cfg.value??cfg.min,cfg.min,cfg.max),tip=polar(cx,cy,needleR,a),bs=angleFor(cfg.ideal[0],cfg.min,cfg.max),be=angleFor(cfg.ideal[1],cfg.min,cfg.max);
      card.innerHTML=`<div class="gauge-wrap"><svg class="gauge-svg" viewBox="0 0 ${w} ${h}"><path d="${arcPath(cx,cy,132,-90,90)}" stroke="rgba(236,243,248,.92)" stroke-width="24" fill="none" stroke-linecap="round"></path><path d="${arcPath(cx,cy,outer,-90,90)}" stroke="rgba(255,255,255,.35)" stroke-width="31" fill="none" stroke-linecap="round"></path>${segs}${ticks}<path d="${arcPath(cx,cy,br,bs,be)}" stroke="rgba(3,15,28,.65)" stroke-width="18" fill="none" stroke-linecap="round"></path><path d="${arcPath(cx,cy,br,bs,be)}" stroke="#18d17f" stroke-width="10" fill="none" stroke-linecap="round"></path><path d="M ${cx} ${cy} L ${tip.x} ${tip.y}" stroke="#f3f7fb" stroke-width="5" stroke-linecap="round"></path><circle cx="${cx}" cy="${cy}" r="10" fill="#dfeaf3"></circle></svg></div><div class="gauge-name">${cfg.name}</div><div class="gauge-reading">${fmt(cfg.value,cfg.unit?' '+cfg.unit:'')}</div><div class="ideal">Ideal: ${cfg.idealLabel}</div>`;
      return card;
    }
    function gaugeConfigs(latest){const hardnessValue=latest.ch??500; return [{name:'Hardness',value:hardnessValue,unit:'ppm',min:0,max:1000,ideal:[250,400],idealLabel:'250-400 ppm',stops:[{value:0,label:'0',color:'#dce8fb'},{value:100,label:'100',color:'#9ab4e5'},{value:250,label:'250',color:'#8c7dd8'},{value:500,label:'500',color:'#8a57bc'},{value:1000,label:'1000',color:'#7b2d8d'}]},{name:'Free Chlorine',value:latest.fc,unit:'ppm',min:0,max:10,ideal:[3,6],idealLabel:'3-6 ppm',stops:[{value:0,label:'0',color:'#f7eef8'},{value:.5,label:'0.5',color:'#ecd9f2'},{value:1,label:'1',color:'#dcb9e8'},{value:3,label:'3',color:'#bf87d8'},{value:5,label:'5',color:'#a254bc'},{value:10,label:'10',color:'#8f1a91'}]},{name:'CYA',value:latest.cya,unit:'ppm',min:0,max:240,ideal:[30,50],idealLabel:'30-50 ppm',stops:[{value:0,label:'0',color:'#f3be92'},{value:40,label:'30-50',color:'#eaa5a0'},{value:100,label:'100',color:'#e58d98'},{value:150,label:'150',color:'#c86886'},{value:240,label:'240',color:'#9b6476'}]},{name:'Alkalinity',value:latest.ta,unit:'ppm',min:0,max:240,ideal:[70,100],idealLabel:'70-100 ppm',stops:[{value:0,label:'0',color:'#e4e798'},{value:40,label:'40',color:'#bad89c'},{value:80,label:'80',color:'#9fd2b2'},{value:120,label:'120',color:'#8acfd0'},{value:180,label:'180',color:'#69c7d9'},{value:240,label:'240',color:'#53b6d7'}]},{name:'pH',value:latest.ph,unit:'',min:6.2,max:9,ideal:[7.4,7.6],idealLabel:'7.4-7.6',stops:[{value:6.2,label:'6.2',color:'#f0c84d'},{value:6.8,label:'6.8',color:'#efa048'},{value:7.2,label:'7.2',color:'#eb8a47'},{value:7.8,label:'7.8',color:'#e97b47'},{value:8.4,label:'8.4',color:'#df6948'},{value:9,label:'9.0',color:'#d85a47'}]},{name:'Total Chlorine',value:latest.tc,unit:'ppm',min:0,max:10,ideal:[3,6],idealLabel:'3-6 ppm',stops:[{value:0,label:'0',color:'#e6ea73'},{value:.5,label:'0.5',color:'#cae26e'},{value:1,label:'1',color:'#add96a'},{value:3,label:'3',color:'#83c761'},{value:5,label:'5',color:'#54b257'},{value:10,label:'10',color:'#2f934b'}]}]}
    function renderAll(){
      const rows=sortedTests(),latest=rows[rows.length-1],grid=document.getElementById('gaugeGrid');
      document.getElementById('appVersion').textContent=APP_VERSION;
      document.getElementById('latestDate').textContent=latest?(latest.time?`${latest.date} - ${latest.time}`:latest.date):'-';
      document.getElementById('latestSummary').textContent=latest?`FC ${fmt(latest.fc,' ppm')} - pH ${fmt(latest.ph)} - TA ${fmt(latest.ta,' ppm')} - CYA ${fmt(latest.cya,' ppm')}`:'No rows yet.';
      grid.replaceChildren(); if(latest) gaugeConfigs(latest).forEach(cfg=>grid.appendChild(gauge(cfg)));
      const recent=document.getElementById('recentRows'); recent.replaceChildren(); rows.slice().reverse().slice(0,6).forEach(row=>{const el=document.createElement('div'); el.className='recent-row'; const simpleTime=formatSimpleTime(row.time); el.innerHTML=`<span><strong>${row.date}</strong>${simpleTime?' '+simpleTime:''}<br>${row.source}</span><span>${row.photo?'Photo saved':'No photo'}</span>`; recent.appendChild(el)});
    }
    document.getElementById('stripCamera').addEventListener('change',event=>handleUpload(event,'strip'));
    document.getElementById('stripLibrary').addEventListener('change',event=>handleUpload(event,'strip'));
    document.getElementById('leslieCamera').addEventListener('change',event=>handleUpload(event,'leslie'));
    document.getElementById('leslieLibrary').addEventListener('change',event=>handleUpload(event,'leslie'));
    window.addEventListener('focus',loadSharedLedger);
    document.addEventListener('visibilitychange',()=>{if(!document.hidden) loadSharedLedger();});
    renderAll();
    loadSharedLedger();
  </script>
